appId: com.screenscreen.meetingrecorder
productName: ScreenScreen
copyright: Copyright © 2026 Divergent Inc

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/@huggingface/transformers/dist/onnxruntime-web/**"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - universal
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

extraResources:
  - from: node_modules/ffmpeg-static/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
