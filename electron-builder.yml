appId: com.divergentinc.discreenrecorder
productName: DiScreenRecorder
copyright: Copyright © 2026 Divergent Inc

directories:
  output: release
  buildResources: build

files:
  - dist/**/*
  - node_modules/**/*
  - "!node_modules/@esbuild/**"
  - "!node_modules/esbuild/**"
  - "!node_modules/vite/**"
  - "!node_modules/@vitejs/**"
  - "!node_modules/tailwindcss/**"
  - "!node_modules/@tailwindcss/**"
  - "!node_modules/typescript/**"
  - "!node_modules/electron/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/concurrently/**"
  - "!node_modules/@huggingface/transformers/dist/onnxruntime-web/**"

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  darkModeSupport: true

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

extraResources:
  - from: node_modules/ffmpeg-static/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
