name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Compile whisper-cli (arm64)
        run: |
          mkdir -p binaries/whisper/mac-arm64
          WHISPER_VERSION="1.8.3"
          git clone --depth 1 --branch v${WHISPER_VERSION} https://github.com/ggml-org/whisper.cpp /tmp/whisper
          cd /tmp/whisper
          cmake -B build -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/binaries/whisper/mac-arm64/whisper-cli
          chmod +x $GITHUB_WORKSPACE/binaries/whisper/mac-arm64/whisper-cli

      - name: Build Mac DMG (arm64)
        run: npx electron-builder --mac --arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: release/*.dmg

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Compile whisper-cli (x86_64)
        run: |
          mkdir -p binaries/whisper/mac-x64
          WHISPER_VERSION="1.8.3"
          git clone --depth 1 --branch v${WHISPER_VERSION} https://github.com/ggml-org/whisper.cpp /tmp/whisper
          cd /tmp/whisper
          cmake -B build
          cmake --build build --config Release -j$(sysctl -n hw.ncpu)
          cp build/bin/whisper-cli $GITHUB_WORKSPACE/binaries/whisper/mac-x64/whisper-cli
          chmod +x $GITHUB_WORKSPACE/binaries/whisper/mac-x64/whisper-cli

      - name: Build Mac DMG (x64)
        run: npx electron-builder --mac --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Download whisper binary (Windows x64)
        shell: bash
        run: |
          mkdir -p binaries/whisper/win-x64
          WHISPER_VERSION="1.8.3"
          curl -fL "https://github.com/ggml-org/whisper.cpp/releases/download/v${WHISPER_VERSION}/whisper-bin-x64.zip" -o /tmp/whisper.zip
          unzip /tmp/whisper.zip -d /tmp/whisper-bin
          # Find whisper-cli.exe wherever it lands in the archive
          find /tmp/whisper-bin -name "whisper-cli.exe" -exec cp {} binaries/whisper/win-x64/whisper-cli.exe \; || \
          echo "Warning: whisper-cli.exe not found in release archive"
          ls -la binaries/whisper/win-x64/

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: release/*.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiScreenRecorder ${{ github.ref_name }}
          body: |
            ## DiScreenRecorder ${{ github.ref_name }}

            ### What's New
            - Screenshots during recording (camera button captures screen)
            - DOCX (Word) export for meeting minutes with embedded screenshots
            - Google Calendar integration with auto-record reminders
            - CI/CD pipeline for automated Mac + Windows releases

            ### Downloads
            - **macOS Apple Silicon (M1/M2/M3/M4):** `DiScreenRecorder-*-arm64.dmg`
            - **macOS Intel:** `DiScreenRecorder-*.dmg`
            - **Windows:** `DiScreenRecorder-Setup-*.exe`

            ### Requirements
            - macOS 12+ or Windows 10+
            - Cloudflare Worker URL (for cloud transcription & AI summaries)
            - Optional: Google Calendar API credentials (for calendar sync)
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
