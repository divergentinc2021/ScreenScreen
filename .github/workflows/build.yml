name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_release:
        description: 'Create GitHub Release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Download whisper binary (macOS ${{ matrix.arch }})
        run: |
          mkdir -p binaries/whisper/mac-${{ matrix.arch }}
          # Download pre-compiled whisper-cli for this arch
          WHISPER_VERSION="1.7.5"
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            # Build from source on arm64 runner
            git clone --depth 1 --branch v${WHISPER_VERSION} https://github.com/ggml-org/whisper.cpp /tmp/whisper
            cd /tmp/whisper
            cmake -B build -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
            cmake --build build --config Release -j$(sysctl -n hw.ncpu)
            cp build/bin/whisper-cli $GITHUB_WORKSPACE/binaries/whisper/mac-${{ matrix.arch }}/whisper-cli
          else
            git clone --depth 1 --branch v${WHISPER_VERSION} https://github.com/ggml-org/whisper.cpp /tmp/whisper
            cd /tmp/whisper
            cmake -B build -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
            cmake --build build --config Release -j$(sysctl -n hw.ncpu)
            cp build/bin/whisper-cli $GITHUB_WORKSPACE/binaries/whisper/mac-${{ matrix.arch }}/whisper-cli
          fi
          chmod +x $GITHUB_WORKSPACE/binaries/whisper/mac-${{ matrix.arch }}/whisper-cli

      - name: Build Mac DMG (${{ matrix.arch }})
        run: npx electron-builder --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: release/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Download whisper binary (Windows x64)
        shell: bash
        run: |
          mkdir -p binaries/whisper/win-x64
          WHISPER_VERSION="1.7.5"
          # Download Windows release from ggml-org
          curl -L "https://github.com/ggml-org/whisper.cpp/releases/download/v${WHISPER_VERSION}/whisper-bin-x64.zip" -o /tmp/whisper.zip
          unzip /tmp/whisper.zip -d /tmp/whisper-bin
          cp /tmp/whisper-bin/whisper-cli.exe binaries/whisper/win-x64/whisper-cli.exe || \
          cp /tmp/whisper-bin/bin/whisper-cli.exe binaries/whisper/win-x64/whisper-cli.exe || \
          echo "Warning: Could not find whisper-cli.exe in release archive"

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: release/*.exe

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiScreenRecorder v${{ github.ref_name }}
          body: |
            ## DiScreenRecorder ${{ github.ref_name }}

            ### What's New
            - Screenshots during recording (camera button captures screen)
            - DOCX (Word) export for meeting minutes with embedded screenshots
            - Google Calendar integration with auto-record reminders

            ### Downloads
            - **macOS Apple Silicon (M1/M2/M3):** `DiScreenRecorder-*-arm64.dmg`
            - **macOS Intel:** `DiScreenRecorder-*-x64.dmg`
            - **Windows:** `DiScreenRecorder-Setup-*.exe`

            ### Requirements
            - macOS 12+ or Windows 10+
            - Cloudflare Worker URL (for cloud transcription & AI summaries)
            - Optional: Google Calendar API credentials (for calendar sync)
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
