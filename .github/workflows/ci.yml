name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check (renderer)
        run: npx tsc --noEmit

      - name: TypeScript check (electron)
        run: npx tsc -p tsconfig.electron.json --noEmit

      - name: Build renderer
        run: npm run build:renderer

      - name: Build electron
        run: npm run build:electron

  worker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install worker dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
